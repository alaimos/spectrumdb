[www]
user  = www
group = www

listen       = /run/php/php-fpm.sock
listen.owner = www
listen.group = www
listen.mode  = 0660

pm                   = dynamic
pm.max_children      = 25
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Allow long-running requests (large uploads, R analyses launched from
; controllers). Matches max_execution_time in php.ini with a small buffer.
request_terminate_timeout = 700s

clear_env = no

catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
