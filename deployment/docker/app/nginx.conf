user www;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # -------------------------------------------------------------------------
    # Large file uploads.
    # -------------------------------------------------------------------------
    # Must be >= post_max_size / upload_max_filesize in php.ini. If you raise
    # any of those, also raise the matching `request_body max_size` directive
    # in deployment/Caddyfile - otherwise Caddy will reject the upload before
    # it even reaches nginx.
    client_max_body_size       512M;
    client_body_buffer_size    1m;
    # Generous timeouts for slow connections pushing big files. Matches the
    # max_execution_time / fastcgi_read_timeout (600s).
    client_body_timeout        600s;
    client_header_timeout      60s;
    send_timeout               600s;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /dev/stdout main;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/xml+rss
        image/svg+xml font/ttf font/otf;

    # Trust the Caddy reverse proxy upstream.
    set_real_ip_from 0.0.0.0/0;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    include /etc/nginx/sites-enabled/*.conf;
}
