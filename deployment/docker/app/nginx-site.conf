server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Restated here in addition to the http{} default so it is obvious when
    # auditing the server block. Must stay >= php.ini's post_max_size.
    client_max_body_size 512M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           $http_x_forwarded_proto if_not_empty;

        # Timeouts aligned with php.ini max_execution_time (600s) so large
        # uploads / long analyses don't get killed mid-request.
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    600s;
        fastcgi_read_timeout    600s;

        fastcgi_buffers       16 16k;
        fastcgi_buffer_size   32k;
        # Buffer the full request to disk before handing it to php-fpm so a
        # slow client cannot tie up an FPM worker. Disk temp files for big
        # bodies are written under /var/lib/nginx/body by default.
        fastcgi_request_buffering on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
